<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JARVIS — Kartik's AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
:root {
  --bg: #020408;
  --bg2: #050c14;
  --bg3: #081018;
  --cyan: #00f5ff;
  --green: #00ff9d;
  --pink: #ff0080;
  --text: #c8dde8;
  --muted: #3a5a6a;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; height:100dvh; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  display: flex; flex-direction: column;
  height: 100%; height:100dvh;
  overflow: hidden;
  background-image:
    linear-gradient(rgba(0,245,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
}
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
}

/* ── HEADER ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:.75rem 1.25rem;
  background: rgba(2,4,8,0.95);
  border-bottom: 1px solid rgba(0,245,255,0.1);
  backdrop-filter: blur(20px);
  position:relative; z-index:50; flex-shrink:0;
}
.hdr-left { display:flex; align-items:center; gap:.75rem; }
.hdr-icon {
  width:38px; height:38px; border-radius:50%;
  background: linear-gradient(135deg, #000d1a, #001a2e);
  border: 1px solid rgba(0,255,157,0.4);
  display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron',monospace; font-size:.95rem; font-weight:900;
  color: var(--green); text-shadow: 0 0 12px rgba(0,255,157,0.8);
  box-shadow: 0 0 12px rgba(0,255,157,0.15);
  position:relative; overflow:hidden; flex-shrink:0;
}
.hdr-icon::after {
  content:''; position:absolute; inset:0; border-radius:50%;
  background: conic-gradient(from 0deg, transparent 0%, rgba(0,255,157,0.2) 25%, transparent 50%);
  animation: rot 3s linear infinite;
}
@keyframes rot { to{transform:rotate(360deg)} }
.hdr-name {
  font-family:'Orbitron',monospace; font-size:.8rem; font-weight:700;
  color: var(--green); letter-spacing:.12em;
  text-shadow: 0 0 8px rgba(0,255,157,0.4);
}
.hdr-status {
  font-family:'Share Tech Mono',monospace; font-size:.6rem;
  color: var(--muted); display:flex; align-items:center; gap:.35rem; margin-top:1px;
}
.sdot { width:5px; height:5px; background:var(--green); border-radius:50%; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

.hdr-right { display:flex; align-items:center; gap:.5rem; }
.hdr-btn {
  font-family:'Share Tech Mono',monospace; font-size:.6rem;
  background:none; border:1px solid rgba(255,255,255,0.08);
  color:var(--muted); padding:.35rem .65rem; cursor:pointer;
  letter-spacing:.08em; transition:all .2s; border-radius:4px;
}
.hdr-btn:hover { border-color:rgba(0,245,255,0.3); color:var(--cyan); }
.hdr-btn.active { border-color:rgba(0,255,157,0.4); color:var(--green); background:rgba(0,255,157,0.06); }
.hdr-btn.on { border-color:rgba(0,245,255,0.3); color:var(--cyan); }
a.hdr-btn { text-decoration:none; }

/* ── TOOLBAR ── */
.toolbar {
  display:flex; align-items:center; gap:.5rem; padding:.5rem 1.25rem;
  background: rgba(5,12,20,0.9);
  border-bottom: 1px solid rgba(0,245,255,0.06);
  position:relative; z-index:40; flex-shrink:0; flex-wrap:wrap;
}
.tool-btn {
  font-family:'Share Tech Mono',monospace; font-size:.6rem;
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
  color:var(--muted); padding:.3rem .65rem; cursor:pointer;
  letter-spacing:.06em; transition:all .2s; border-radius:3px;
  display:flex; align-items:center; gap:.3rem;
}
.tool-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.15); }
.tool-btn.active { color:var(--cyan); border-color:rgba(0,245,255,0.35); background:rgba(0,245,255,0.05); }
.tool-sep { width:1px; height:16px; background:rgba(255,255,255,0.07); flex-shrink:0; }
.model-info {
  font-family:'Share Tech Mono',monospace; font-size:.58rem;
  color:var(--muted); margin-left:auto; letter-spacing:.05em;
}

/* ── MESSAGES ── */
.messages {
  flex:1; overflow-y:auto; padding:1.25rem;
  display:flex; flex-direction:column; gap:.85rem;
  position:relative; z-index:1;
  scrollbar-width:thin; scrollbar-color:rgba(0,245,255,0.12) transparent;
}
.messages::-webkit-scrollbar { width:3px; }
.messages::-webkit-scrollbar-thumb { background:rgba(0,245,255,0.15); border-radius:2px; }

/* Welcome */
.welcome { text-align:center; padding:2rem 1rem 1.5rem; }
.welcome-icon {
  width:72px; height:72px; border-radius:50%; margin:0 auto 1.25rem;
  background:linear-gradient(135deg,#000d1a,#001a2e);
  border:2px solid rgba(0,255,157,0.3);
  display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron',monospace; font-size:1.8rem; font-weight:900;
  color:var(--green); text-shadow:0 0 20px rgba(0,255,157,0.8);
  box-shadow:0 0 25px rgba(0,255,157,0.1); position:relative; overflow:hidden;
}
.welcome-icon::after {
  content:''; position:absolute; inset:-2px; border-radius:50%;
  background:conic-gradient(from 0deg, transparent 0%, rgba(0,255,157,0.2) 25%, transparent 50%);
  animation:rot 3s linear infinite;
}
.welcome-title { font-family:'Orbitron',monospace; font-size:1.3rem; font-weight:900; color:var(--text); margin-bottom:.3rem; }
.welcome-title span { color:var(--green); text-shadow:0 0 12px rgba(0,255,157,0.5); }
.welcome-sub { font-family:'Share Tech Mono',monospace; font-size:.65rem; color:var(--muted); letter-spacing:.1em; margin-bottom:1.5rem; }
.suggestions { display:flex; flex-wrap:wrap; gap:.4rem; justify-content:center; }
.sug {
  font-family:'Share Tech Mono',monospace; font-size:.65rem;
  color:var(--cyan); border:1px solid rgba(0,245,255,0.18);
  padding:.35rem .8rem; cursor:pointer; letter-spacing:.04em;
  transition:all .2s; background:rgba(0,245,255,0.03); border-radius:3px;
}
.sug:hover { background:rgba(0,245,255,0.08); border-color:rgba(0,245,255,0.45); }

/* Messages */
.msg { display:flex; gap:.6rem; animation:msgIn .25s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg.user { align-self:flex-end; flex-direction:row-reverse; max-width:88%; }
.msg.bot { max-width:92%; }
.avatar {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron',monospace; font-size:.65rem; font-weight:700;
  margin-top:2px;
}
.msg.bot .avatar {
  background:linear-gradient(135deg,#000d1a,#001a2e);
  border:1px solid rgba(0,255,157,0.3); color:var(--green);
  box-shadow:0 0 8px rgba(0,255,157,0.12);
}
.msg.user .avatar {
  background:linear-gradient(135deg,#0a0015,#1a0030);
  border:1px solid rgba(255,0,128,0.3); color:var(--pink); font-size:.6rem;
}
.bubble {
  padding:.7rem .95rem; font-size:.9rem; line-height:1.65;
  word-break:break-word;
}
.msg.bot .bubble {
  background:rgba(0,255,157,0.04); border:1px solid rgba(0,255,157,0.1);
  border-radius:3px 10px 10px 10px; color:var(--text);
}
.msg.bot .bubble.speaking { border-color:rgba(0,255,157,0.4); box-shadow:0 0 12px rgba(0,255,157,0.07); }
.msg.user .bubble {
  background:rgba(255,0,128,0.05); border:1px solid rgba(255,0,128,0.12);
  border-radius:10px 3px 10px 10px; color:var(--text);
}
.msg-meta {
  font-family:'Share Tech Mono',monospace; font-size:.55rem;
  color:var(--muted); margin-top:.3rem; display:flex; align-items:center; gap:.5rem;
}
.copy-btn {
  background:none; border:none; cursor:pointer; color:var(--muted);
  font-size:.65rem; padding:.1rem .3rem; transition:color .2s;
  font-family:'Share Tech Mono',monospace;
}
.copy-btn:hover { color:var(--cyan); }
.search-badge {
  font-family:'Share Tech Mono',monospace; font-size:.55rem;
  color:var(--cyan); border:1px solid rgba(0,245,255,0.2);
  padding:.1rem .4rem; border-radius:2px;
}

/* Markdown styles */
.bubble h1,.bubble h2,.bubble h3 { color:var(--cyan); font-family:'Orbitron',monospace; margin:.8rem 0 .4rem; font-size:1rem; }
.bubble h3 { font-size:.9rem; color:var(--green); }
.bubble p { margin:.4rem 0; }
.bubble ul,.bubble ol { padding-left:1.2rem; margin:.4rem 0; }
.bubble li { margin:.2rem 0; }
.bubble strong { color:var(--text); font-weight:700; }
.bubble em { color:var(--cyan); font-style:italic; }
.bubble code:not(pre code) {
  font-family:'Share Tech Mono',monospace; font-size:.8rem;
  background:rgba(0,245,255,0.08); border:1px solid rgba(0,245,255,0.15);
  padding:.1rem .4rem; border-radius:3px; color:var(--cyan);
}
.bubble pre {
  background:#1a1f2e; border:1px solid rgba(0,245,255,0.1);
  border-radius:6px; overflow:hidden; margin:.6rem 0;
  position:relative;
}
.code-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:.4rem .75rem; background:rgba(0,245,255,0.05);
  border-bottom:1px solid rgba(0,245,255,0.08);
}
.code-lang { font-family:'Share Tech Mono',monospace; font-size:.6rem; color:var(--cyan); letter-spacing:.08em; }
.code-copy {
  font-family:'Share Tech Mono',monospace; font-size:.6rem;
  background:none; border:1px solid rgba(0,245,255,0.2);
  color:var(--muted); padding:.2rem .5rem; cursor:pointer; border-radius:3px;
  transition:all .2s; letter-spacing:.04em;
}
.code-copy:hover { color:var(--cyan); border-color:rgba(0,245,255,0.5); }
.bubble pre code { background:none; border:none; padding:.75rem; display:block; font-size:.78rem; }
.bubble blockquote {
  border-left:2px solid var(--cyan); padding:.4rem .75rem;
  margin:.4rem 0; color:var(--muted); font-style:italic;
}
.bubble table { border-collapse:collapse; width:100%; margin:.5rem 0; font-size:.82rem; }
.bubble th { background:rgba(0,245,255,0.08); color:var(--cyan); padding:.4rem .6rem; border:1px solid rgba(0,245,255,0.15); }
.bubble td { padding:.35rem .6rem; border:1px solid rgba(255,255,255,0.06); }
.bubble a { color:var(--cyan); text-decoration:none; border-bottom:1px solid rgba(0,245,255,0.3); }
.bubble a:hover { border-color:var(--cyan); }

/* Image preview */
.img-preview {
  max-width:200px; max-height:150px; border-radius:6px;
  border:1px solid rgba(0,245,255,0.2); margin-bottom:.4rem; display:block;
}

/* Typing */
.typing-ind { display:flex; gap:4px; padding:.3rem 0; align-items:center; }
.typing-ind span {
  width:6px; height:6px; background:var(--green); border-radius:50%;
  animation:tdot 1.2s infinite;
}
.typing-ind span:nth-child(2){animation-delay:.2s}
.typing-ind span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-6px);opacity:1}}

/* ── IMAGE PREVIEW BAR ── */
.img-bar {
  display:none; padding:.5rem 1.25rem;
  background:rgba(5,12,20,0.9); border-top:1px solid rgba(0,245,255,0.08);
  align-items:center; gap:.75rem; flex-shrink:0; position:relative; z-index:40;
}
.img-bar.show { display:flex; }
.img-thumb { width:40px; height:40px; border-radius:4px; object-fit:cover; border:1px solid rgba(0,245,255,0.2); }
.img-name { font-family:'Share Tech Mono',monospace; font-size:.65rem; color:var(--muted); flex:1; }
.img-remove {
  background:none; border:none; color:var(--muted); cursor:pointer;
  font-size:.8rem; padding:.2rem; transition:color .2s;
}
.img-remove:hover { color:var(--pink); }

/* ── INPUT ── */
.input-area {
  padding:.75rem 1.25rem;
  background:rgba(2,4,8,0.95);
  border-top:1px solid rgba(0,245,255,0.08);
  position:relative; z-index:50; flex-shrink:0;
}
.input-row {
  display:flex; gap:.5rem; align-items:flex-end;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(0,245,255,0.12);
  border-radius:10px; padding:.5rem .75rem;
  transition:border-color .2s;
}
.input-row:focus-within { border-color:rgba(0,245,255,0.28); }
.input-actions { display:flex; gap:.3rem; align-items:center; flex-shrink:0; }
.iact-btn {
  background:none; border:none; cursor:pointer;
  width:30px; height:30px; display:flex; align-items:center; justify-content:center;
  color:var(--muted); font-size:.95rem; transition:all .2s; border-radius:5px;
}
.iact-btn:hover { color:var(--green); background:rgba(0,255,157,0.08); }
.iact-btn.listening { color:var(--pink); animation:pulse 1s infinite; }
.chat-input {
  flex:1; background:none; border:none; outline:none;
  color:var(--text); font-size:16px;
  font-family:'Rajdhani',sans-serif; font-weight:500;
  resize:none; max-height:120px; min-height:24px;
  line-height:1.5;
}
.chat-input::placeholder { color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:.7rem; }
.send-btn {
  width:34px; height:34px; border-radius:7px;
  background:linear-gradient(135deg,var(--green),var(--cyan));
  border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:.85rem; transition:all .2s; flex-shrink:0; color:#000; font-weight:900;
}
.send-btn:hover { transform:scale(1.05); box-shadow:0 0 12px rgba(0,255,157,0.3); }
.send-btn:disabled { opacity:.3; cursor:not-allowed; transform:none; box-shadow:none; }
.input-hint {
  font-family:'Share Tech Mono',monospace; font-size:.55rem;
  color:var(--muted); text-align:center; margin-top:.4rem; letter-spacing:.04em;
}
.input-hint a { color:var(--cyan); text-decoration:none; }

/* ── MOBILE ── */
@media(max-width:600px){
  header { padding:.6rem 1rem; }
  .toolbar { padding:.4rem 1rem; gap:.35rem; }
  .tool-btn { font-size:.55rem; padding:.25rem .5rem; }
  .model-info { display:none; }
  .messages { padding:.75rem; gap:.6rem; }
  .msg.bot,.msg.user { max-width:96%; }
  .bubble { font-size:.85rem; padding:.6rem .8rem; }
  .input-area { padding:.6rem 1rem; }
  .input-hint { display:none; }
  a.hdr-btn:first-child { display:none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hdr-left">
    <div class="hdr-icon">J</div>
    <div>
      <div class="hdr-name">J.A.R.V.I.S</div>
      <div class="hdr-status">
        <span class="sdot"></span>
        <span id="status-text">Initializing...</span>
      </div>
    </div>
  </div>
  <div class="hdr-right">
    <a href="https://kartikdev.best" class="hdr-btn">← Portfolio</a>
    <button class="hdr-btn" id="voice-btn" onclick="toggleVoice()">🔊 Voice</button>
    <button class="hdr-btn" onclick="clearChat()">🗑 Clear</button>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="tool-btn active" id="search-btn" onclick="toggleSearch()">🔍 Web Search</button>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="hinglish-btn" onclick="toggleHinglish()">🇮🇳 Hinglish</button>
  <div class="tool-sep"></div>
  <label class="tool-btn" style="cursor:pointer;" for="file-input">📎 Image</label>
  <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this)">
  <div class="tool-sep"></div>
  <span class="model-info" id="model-info">llama-3.3-70b-versatile</span>
</div>

<!-- IMAGE PREVIEW -->
<div class="img-bar" id="img-bar">
  <img class="img-thumb" id="img-thumb" src="" alt="">
  <span class="img-name" id="img-name">image.jpg</span>
  <button class="img-remove" onclick="removeFile()">✕</button>
</div>

<!-- MESSAGES -->
<div class="messages" id="messages">
  <div class="welcome">
    <div class="welcome-icon">J</div>
    <div class="welcome-title">I'm <span>JARVIS</span></div>
    <div class="welcome-sub">// KARTIK'S PERSONAL AI — POWERED BY GROQ</div>
    <div class="suggestions">
      <span class="sug" onclick="ask(this)">Who is Kartik?</span>
      <span class="sug" onclick="ask(this)">Write Python code</span>
      <span class="sug" onclick="ask(this)">Latest AI news 🔍</span>
      <span class="sug" onclick="ask(this)">Explain ML simply</span>
      <span class="sug" onclick="ask(this)">Mujhe Java samjhao 🇮🇳</span>
      <span class="sug" onclick="ask(this)">CyberCafe143 kya hai?</span>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <div class="input-actions">
      <button class="iact-btn" id="mic-btn" onclick="toggleMic()" title="Voice input">🎤</button>
    </div>
    <textarea class="chat-input" id="chat-input" placeholder="Ask JARVIS anything..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
  </div>
  <div class="input-hint">JARVIS v2.0 · <a href="https://kartikdev.best">kartikdev.best</a> · Shift+Enter for new line</div>
</div>

<script>
/* ── CONFIG ── */
// 👇 Change this to your actual Render backend URL after deploying!
const BACKEND_URL = 'https://jarvis-backend-cf70.onrender.com';

let voiceOn = false;
let searchOn = true;
let hinglishOn = false;
let isListening = false;
let isSending = false;
let recognition = null;
let selectedFile = null;
let msgHistory = [];

/* ── LOAD HISTORY ── */
function loadHistory() {
  try {
    const saved = localStorage.getItem('jarvis_history');
    if(saved) msgHistory = JSON.parse(saved);
  } catch(e) { msgHistory = []; }
}

function saveHistory() {
  try {
    localStorage.setItem('jarvis_history', JSON.stringify(msgHistory.slice(-30)));
  } catch(e) {}
}

/* ── VOICE ── */
const synth = window.speechSynthesis;
let voices = [], jarvisVoice = null;
function loadVoices() {
  voices = synth.getVoices();
  jarvisVoice = voices.find(v=>v.name.includes('Google UK English Male')) ||
                voices.find(v=>v.name.includes('Microsoft David')) ||
                voices.find(v=>v.lang==='en-IN') ||
                voices.find(v=>v.lang.startsWith('en')) || voices[0];
}
loadVoices();
if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged=loadVoices;

function speak(text, el) {
  if(!voiceOn) return;
  synth.cancel();
  const clean = text.replace(/[#*`_~\[\]]/g,'').replace(/```[\s\S]*?```/g,'[code block]');
  const utt = new SpeechSynthesisUtterance(clean);
  utt.voice=jarvisVoice; utt.rate=0.92; utt.pitch=0.85;
  if(el){ utt.onstart=()=>el.classList.add('speaking'); utt.onend=()=>el.classList.remove('speaking'); }
  synth.speak(utt);
}

function toggleVoice() {
  voiceOn=!voiceOn; synth.cancel();
  const btn=document.getElementById('voice-btn');
  btn.textContent=voiceOn?'🔊 Voice ON':'🔇 Voice OFF';
  btn.classList.toggle('on',voiceOn);
}

/* ── TOOLBAR TOGGLES ── */
function toggleSearch() {
  searchOn=!searchOn;
  document.getElementById('search-btn').classList.toggle('active',searchOn);
}

function toggleHinglish() {
  hinglishOn=!hinglishOn;
  document.getElementById('hinglish-btn').classList.toggle('active',hinglishOn);
}

/* ── FILE HANDLING ── */
function handleFile(input) {
  const file = input.files[0];
  if(!file) return;
  selectedFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById('img-thumb').src = url;
  document.getElementById('img-name').textContent = file.name;
  document.getElementById('img-bar').classList.add('show');
}

function removeFile() {
  selectedFile = null;
  document.getElementById('img-bar').classList.remove('show');
  document.getElementById('file-input').value = '';
}

/* ── MARKDOWN RENDER ── */
marked.setOptions({
  highlight: function(code, lang) {
    if(lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, {language:lang}).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true
});

function renderMarkdown(text) {
  let html = marked.parse(text);
  // Add code header with copy button
  html = html.replace(/<pre><code class="language-(\w+)">/g, (_, lang) => {
    return `<pre><div class="code-header"><span class="code-lang">${lang.toUpperCase()}</span><button class="code-copy" onclick="copyCode(this)">COPY</button></div><code class="language-${lang}">`;
  });
  html = html.replace(/<pre><code>/g, `<pre><div class="code-header"><span class="code-lang">CODE</span><button class="code-copy" onclick="copyCode(this)">COPY</button></div><code>`);
  return html;
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='COPIED!'; btn.style.color='var(--green)';
    setTimeout(()=>{ btn.textContent='COPY'; btn.style.color=''; },2000);
  });
}

/* ── UI HELPERS ── */
function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

function now() {
  return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

function addMsg(type, text, imgUrl=null, searchUsed=false) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className=`msg ${type}`;

  const avatar = document.createElement('div');
  avatar.className='avatar';
  avatar.textContent = type==='bot'?'J':'U';

  const right = document.createElement('div');
  right.style.flex='1';
  right.style.minWidth='0';

  const bubble = document.createElement('div');
  bubble.className='bubble';

  if(imgUrl) {
    const img = document.createElement('img');
    img.src=imgUrl; img.className='img-preview'; img.alt='uploaded';
    bubble.appendChild(img);
  }

  if(type==='bot') {
    bubble.innerHTML += renderMarkdown(text);
    // Highlight code blocks
    bubble.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));
  } else {
    const p = document.createElement('p');
    p.textContent = text;
    bubble.appendChild(p);
  }

  const meta = document.createElement('div');
  meta.className='msg-meta';
  meta.innerHTML=`<span>${now()}</span>`;
  if(searchUsed) meta.innerHTML+=`<span class="search-badge">🔍 web</span>`;
  if(type==='bot') {
    const copyBtn = document.createElement('button');
    copyBtn.className='copy-btn'; copyBtn.textContent='copy';
    copyBtn.onclick=()=>{
      navigator.clipboard.writeText(text).then(()=>{ copyBtn.textContent='copied!'; setTimeout(()=>copyBtn.textContent='copy',2000); });
    };
    meta.appendChild(copyBtn);
  }

  right.appendChild(bubble);
  right.appendChild(meta);
  wrap.appendChild(avatar);
  wrap.appendChild(right);
  msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
  return bubble;
}

function addTyping() {
  const msgs=document.getElementById('messages');
  const wrap=document.createElement('div');
  wrap.className='msg bot'; wrap.id='typing-wrap';
  wrap.innerHTML=`<div class="avatar">J</div><div><div class="bubble"><div class="typing-ind"><span></span><span></span><span></span></div></div></div>`;
  msgs.appendChild(wrap); msgs.scrollTop=msgs.scrollHeight;
}

function clearChat() {
  document.getElementById('messages').innerHTML='';
  msgHistory=[];
  localStorage.removeItem('jarvis_history');
  synth.cancel();
}

/* ── SEND ── */
async function sendMsg() {
  if(isSending) return;
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text && !selectedFile) return;

  const imgUrl = selectedFile ? URL.createObjectURL(selectedFile) : null;
  input.value=''; input.style.height='auto';
  addMsg('user', text||'[Image]', imgUrl);

  msgHistory.push({role:'user',content:text||'Describe this image.'});
  isSending=true;
  document.getElementById('send-btn').disabled=true;
  document.getElementById('status-text').textContent='Thinking...';
  addTyping();

  try {
    const formData = new FormData();
    formData.append('message', text||'Describe this image in detail.');
    formData.append('history', JSON.stringify(msgHistory.slice(-12)));
    formData.append('searchEnabled', searchOn ? 'true' : 'false');
    formData.append('hinglish', hinglishOn ? 'true' : 'false');
    if(selectedFile) formData.append('file', selectedFile);

    const res = await fetch(`${BACKEND_URL}/api/chat`, {
      method:'POST', body:formData
    });

    document.getElementById('typing-wrap')?.remove();

    if(!res.ok) {
      const err = await res.json();
      throw new Error(err.error||'Backend error');
    }

    const data = await res.json();
    const el = addMsg('bot', data.reply, null, data.searchUsed);
    speak(data.reply, el);
    msgHistory.push({role:'assistant',content:data.reply});
    saveHistory();
    if(data.model) document.getElementById('model-info').textContent=data.model;
    document.getElementById('status-text').textContent='Online — Groq AI';

  } catch(err) {
    document.getElementById('typing-wrap')?.remove();
    addMsg('bot', `❌ Error: ${err.message}\n\nMake sure the backend is running at:\n\`${BACKEND_URL}\``);
    document.getElementById('status-text').textContent='⚠ Backend Error';
  }

  if(selectedFile) removeFile();
  isSending=false;
  document.getElementById('send-btn').disabled=false;
}

function ask(el) {
  document.getElementById('chat-input').value=el.textContent;
  sendMsg();
}

/* ── MIC ── */
function toggleMic() {
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    alert('Voice input needs Chrome!'); return;
  }
  const btn=document.getElementById('mic-btn');
  if(isListening){ recognition.stop(); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR(); recognition.lang='en-IN'; recognition.continuous=false;
  recognition.onresult=e=>{
    document.getElementById('chat-input').value=e.results[0][0].transcript;
    sendMsg();
  };
  recognition.onend=()=>{ isListening=false; btn.classList.remove('listening'); btn.textContent='🎤'; };
  recognition.start(); isListening=true; btn.classList.add('listening'); btn.textContent='🔴';
}

/* ── INIT ── */
window.addEventListener('load',()=>{
  loadHistory();
  document.getElementById('status-text').textContent='Online — Groq AI';
  // Welcome message
  setTimeout(()=>{
    const el=addMsg('bot',"Hello! I'm **JARVIS** — Kartik's personal AI assistant. I can:\n- 🔍 Search the web in real-time\n- 💻 Write & explain code\n- 🖼️ Analyze images\n- 🇮🇳 Chat in Hinglish\n\nWhat can I help you with today?");
    speak("Hello! I'm JARVIS, Kartik's AI. How can I help you?",el);
  },400);
});
</script>
